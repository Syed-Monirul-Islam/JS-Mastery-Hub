<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03. Smart E-commerce Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Smart E-commerce Analyzer</h1>
        
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Inventory Value</h3>
                <p id="total-value">$0</p>
            </div>
        </div>

        <h2>Available Electronics (15% Discount Applied)</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Original Price</th>
                    <th>Discounted Price</th>
                </tr>
            </thead>
            <tbody id="product-list"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
